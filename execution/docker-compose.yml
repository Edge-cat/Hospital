services:
  mysql:
    image: mysql:8.0
    container_name: hospital-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hospital_his
      MYSQL_USER: hospital
      MYSQL_PASSWORD: hospital123
    ports:
      - "3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - hospital_mysql_data:/var/lib/mysql
      - ./database/hospital_his_full.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../hospital-backend
      dockerfile: Dockerfile
    container_name: hospital-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      HOSPITAL_DB_URL: jdbc:mysql://mysql:3306/hospital_his?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      HOSPITAL_DB_USER: hospital
      HOSPITAL_DB_PASSWORD: hospital123
      HOSPITAL_JWT_SECRET: change-me-in-production-min-256-bits-long-secret
      HOSPITAL_WX_DEMO: "true"
      HOSPITAL_CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:5175
    ports:
      - "8080:8080"
    profiles:
      - full

volumes:
  hospital_mysql_data:
