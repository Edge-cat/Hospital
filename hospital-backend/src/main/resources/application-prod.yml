server:
  port: 8080

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${HOSPITAL_DB_URL:jdbc:mysql://127.0.0.1:3307/hospital_his?useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${HOSPITAL_DB_USER:hospital}
    password: ${HOSPITAL_DB_PASSWORD:hospital123}
  sql:
    init:
      mode: never
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

hospital:
  jwt:
    secret: ${HOSPITAL_JWT_SECRET:local-dev-jwt-secret-min-256-bits-long-enough-for-his}
    expire-hours: ${HOSPITAL_JWT_EXPIRE_HOURS:72}
  wx:
    demo: ${HOSPITAL_WX_DEMO:true}
    demo-phone: ${HOSPITAL_WX_DEMO_PHONE:13800138000}
    app-id: ${HOSPITAL_WX_APP_ID:}
    app-secret: ${HOSPITAL_WX_APP_SECRET:}
  cors:
    allowed-origins: ${HOSPITAL_CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
  ai:
    enabled: ${HOSPITAL_AI_ENABLED:true}
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:1200}
