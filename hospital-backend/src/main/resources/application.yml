server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: hospital-backend
  profiles:
    active: prod
  config:
    import: optional:file:./application-local.yml
  cache:
    type: simple
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

---
spring:
  config:
    activate:
      on-profile: redis
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

hospital:
  jwt:
    secret: neusoft-hospital-his-jwt-secret-key-2026-min-256-bits-long!!
    expire-hours: 72
  wx:
    demo: true
    demo-phone: "13800138000"
    app-id: wx0000000000000000
    app-secret: demo-secret
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175
  ai:
    enabled: ${HOSPITAL_AI_ENABLED:true}
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    max-tokens: ${DEEPSEEK_MAX_TOKENS:1200}
